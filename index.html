    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #050505;
            --card-bg: #111112;
            --text-muted: #a0a0a0;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Header Area */
        .top-bar {
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-bar i { color: var(--primary); }
        .top-bar span { font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; }

        /* Video Container */
        .video-wrapper {
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
            object-fit: contain;
        }

        /* Loading Spinner */
        #loader {
            position: absolute;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            z-index: 5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        #error {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 40px;
            text-align: center;
            z-index: 6;
        }

        #error i { font-size: 3rem; color: var(--text-muted); }

        /* CTA Section */
        .action-area {
            padding: 24px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .action-area.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }

        .btn-main:hover {
            background: #b20710;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
        }

        .note-text {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
        }

        /* Ad Banner Section */
        .ad-container {
            padding: 20px 0;
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .ad-placeholder {
            width: 320px;
            height: 50px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #333;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .container { border-radius: 0; }
            .btn-main { width: 80%; justify-content: center; }
        }
    </style>
</head>

<div class="container">

    <div class="video-wrapper">
        <div id="loader"></div>
        <video id="player" controls playsinline muted preload="auto" autoplay>
            Your browser does not support video.
        </video>
        <div id="error">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Content unavailable or link expired.</p>
        </div>
    </div>

    <div class="action-area" id="ctaContainer">

</div>

<script>
    const player = document.getElementById("player");
    const loader = document.getElementById("loader");
    const errorDiv = document.getElementById("error");
    const ctaWrap = document.getElementById("ctaContainer");
    const ctaBtn = document.getElementById("mainCta");

    let popFired = false;

    // 1. Get Video ID from Path
    let videoId = window.location.pathname.split('/').pop().trim();
    if (!videoId || videoId === "" || videoId.includes(".") || videoId === "index.html") {
        // Fallback for testing: Check URL Search Params
        const urlParams = new URLSearchParams(window.location.search);
        videoId = urlParams.get('v');
    }

    // 2. Initialize Video
    if (videoId) {
        player.src = `https://cdn2.videy.co/${videoId}.mp4`;
        
        player.oncanplay = () => {
            loader.style.display = "none";
        };

        player.onerror = () => {
            loader.style.display = "none";
            player.style.display = "none";
            errorDiv.style.display = "flex";
        };
    } else {
        loader.style.display = "none";
        player.style.display = "none";
        errorDiv.style.display = "flex";
    }

    // 3. Inject Popunder Script Function
    function firePop() {
        if (!popFired) {
            popFired = true;
            const s = document.createElement("script");
            s.src = "https://brillianceradiant.com/2e/a1/21/2ea12153a74996b501c2507cb4eebc96.js";
            document.body.appendChild(s);
        }
    }

    // Fire popunder on interaction (unmute/volume change)
    player.addEventListener("volumechange", () => {
        if (!player.muted && player.volume > 0) firePop();
    });

    // Fire popunder on play
    player.addEventListener("play", () => {
        setTimeout(firePop, 2000); // 2 sec delay after play
    }, { once: true });

    // 4. CTA Logic
    setTimeout(() => {
        ctaWrap.classList.add('visible');
    }, 4000); // Show CTA after 4 seconds

    ctaBtn.onclick = (e) => {
        e.preventDefault();
        firePop(); // Force popunder on button click too
        
        // Use a short timeout to ensure tracking/pop triggers
        setTimeout(() => {
            window.open("https://brillianceradiant.com/es8hr2ztp?key=bc9c60bed73ac8339a7e8082cfaa1519", "_blank");
        }, 200);

    })();
</script>
