<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream</title>

<meta property="og:title" content="Stream">
<meta property="og:description" content="Watch video instantly">
<meta property="og:image" content="https://vidley.pw/tombolplay.jpg">

<link rel="preconnect" href="https://cdn2.videy.co">

<style>
body{
margin:0;
background:#050505;
color:#fff;
font-family:system-ui,Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTAINER */
.wrapper{
width:100%;
max-width:720px;
background:#0d0d0f;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.7);
border:1px solid rgba(255,0,0,0.12);
}

/* VIDEO */
.video-box{
background:#000;
position:relative;
}

video{
width:100%;
max-height:70vh;
object-fit:contain;
}

/* ERROR */
#error{
display:none;
text-align:center;
padding:40px;
opacity:.6;
}

/* CTA */
.cta{
padding:18px;
text-align:center;
}

.cta a{
display:inline-block;
padding:12px 20px;
background:#e50914;
border-radius:8px;
color:#fff;
font-weight:600;
text-decoration:none;
transition:.2s;
}

.cta a:hover{
background:#b20710;
}

/* ADS */
.ad{
margin:15px auto;
width:320px;
height:50px;
display:flex;
justify-content:center;
align-items:center;
}

/* TOP BAR */
.top{
padding:12px 16px;
font-weight:700;
letter-spacing:.5px;
opacity:.85;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="top"></div>

<div class="video-box">
<video id="player" controls playsinline preload="metadata"></video>
<div id="error">Video unavailable</div>
</div>

<div class="cta">
<a href="#" id="ctaBtn">Watch Full Video</a>
</div>

<!-- BANNER AD -->
<div class="ad">
<script type="text/javascript">
atOptions = {
  'key' : '40f6d8e53b94841ddceb2cbf7ae47723',
  'format' : 'iframe',
  'height' : 50,
  'width' : 320,
  'params' : {}
};
</script>
<script src="https://brillianceradiant.com/40f6d8e53b94841ddceb2cbf7ae47723/invoke.js"></script>
</div>

</div>

<script>

/* GET VIDEO ID */
let videoId = location.pathname.split('/').pop().trim();

if(videoId === "" || videoId.includes(".")){
  videoId = null;
}

const player = document.getElementById("player");
const error = document.getElementById("error");

/* LOAD VIDEO */
if(videoId){
  const url = "https://cdn2.videy.co/" + videoId + ".mp4";
  player.src = url;

  player.onerror = ()=>{
    player.style.display="none";
    error.style.display="block";
  };
}else{
  player.style.display="none";
  error.style.display="block";
}

/* CTA (OPTIONAL) */
document.getElementById("ctaBtn").onclick = function(e){
  e.preventDefault();
  window.open("https://brillianceradiant.com/es8hr2ztp?key=bc9c60bed73ac8339a7e8082cfaa1519","_blank");
};

/* POPUNDER (LOAD AFTER INTERACTION) */
document.addEventListener("click", function(){
  let s = document.createElement("script");
  s.src = "https://brillianceradiant.com/2e/a1/21/2ea12153a74996b501c2507cb4eebc96.js";
  document.body.appendChild(s);
},{once:true});

</script>

hs.async=true;

</script>

</body>
</html>
