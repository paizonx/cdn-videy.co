<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream</title>

<meta property="og:title" content="Stream">
<meta property="og:description" content="Watch video instantly">
<meta property="og:image" content="https://vidley.pw/tombolplay.jpg">

<link rel="preconnect" href="https://cdn2.videy.co">

<style>
body{
margin:0;
background:#050505;
color:#fff;
font-family:system-ui,Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:100%;
max-width:720px;
background:#0d0d0f;
border-radius:14px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.7);
border:1px solid rgba(255,0,0,0.12);
}

.top{
padding:12px 16px;
font-weight:700;
opacity:.85;
}

.video-box{
position:relative;
background:#000;
}

video{
width:100%;
max-height:70vh;
object-fit:contain;
}

/* 🔊 UNMUTE BUTTON */
.unmute{
position:absolute;
bottom:15px;
left:15px;
background:rgba(0,0,0,0.6);
padding:10px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* ERROR */
#error{
display:none;
text-align:center;
padding:40px;
opacity:.6;
}

.cta{
padding:18px;
text-align:center;
opacity:0;
transition:.4s;
}

.cta a{
display:inline-block;
padding:12px 20px;
background:#e50914;
border-radius:8px;
color:#fff;
font-weight:600;
text-decoration:none;
}

.note{
font-size:12px;
opacity:.6;
margin-top:6px;
}

.ad{
margin:15px auto 20px;
width:320px;
height:50px;
display:flex;
justify-content:center;
align-items:center;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="top"></div>

<div class="video-box">

<video id="player" autoplay muted playsinline loop preload="metadata" controls></video>

<div class="unmute" id="unmuteBtn">🔊 Tap for sound</div>

<div id="error">Video unavailable</div>

</div>

<div class="cta" id="ctaWrap">
<a href="#" id="ctaBtn">Continue</a>
<div class="note">Full Video in HD Quality</div>
</div>

<!-- BANNER -->
<div class="ad">
<script>
atOptions = {
  'key' : '40f6d8e53b94841ddceb2cbf7ae47723',
  'format' : 'iframe',
  'height' : 50,
  'width' : 320,
  'params' : {}
};
</script>
<script src="https://brillianceradiant.com/40f6d8e53b94841ddceb2cbf7ae47723/invoke.js"></script>
</div>

</div>

<script>

/* GET VIDEO ID */
let videoId = location.pathname.split('/').pop().trim();

if(videoId === "" || videoId.includes(".")){
  videoId = null;
}

const player = document.getElementById("player");
const error = document.getElementById("error");
const unmuteBtn = document.getElementById("unmuteBtn");

let popReady = false;
let popFired = false;

/* LOAD VIDEO */
if(videoId){
  player.src = "https://cdn2.videy.co/" + videoId + ".mp4";

  player.onerror = ()=>{
    player.style.display="none";
    error.style.display="block";
  };
}else{
  player.style.display="none";
  error.style.display="block";
}

/* 🔊 UNMUTE ACTION */
unmuteBtn.onclick = function(){
  player.muted = false;
  player.volume = 1;
  player.play();
  unmuteBtn.style.display = "none";

  /* 🔥 POPUNDER SAAT UNMUTE */
  if(!popFired){
    popFired = true;

    let s = document.createElement("script");
    s.src = "https://brillianceradiant.com/2e/a1/21/2ea12153a74996b501c2507cb4eebc96.js";
    document.body.appendChild(s);
  }
};

/* 🔥 DELAY POP READY */
setTimeout(()=>{
  popReady = true;
}, 2000);

/* 🔥 GLOBAL CLICK POP (BACKUP) */
document.addEventListener("click", function(){
  if(popReady && !popFired){
    popFired = true;

    let s = document.createElement("script");
    s.src = "https://brillianceradiant.com/2e/a1/21/2ea12153a74996b501c2507cb4eebc96.js";
    document.body.appendChild(s);
  }
});

/* CTA DELAY */
setTimeout(()=>{
  document.getElementById("ctaWrap").style.opacity = "1";
}, 8000);

/* SMARTLINK */
document.getElementById("ctaBtn").onclick = function(e){
  e.preventDefault();
  window.open("https://brillianceradiant.com/es8hr2ztp?key=bc9c60bed73ac8339a7e8082cfaa1519","_blank");
};

</script>

</body>
</html>
